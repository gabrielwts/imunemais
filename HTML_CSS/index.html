<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imune+ | Fazer Login</title>
    <link rel="icon" type="image/x-icon" href="../image/imunemais_icone.png">
    <link rel="stylesheet" href="style.css" type="text/css">
</head>

<body>
    <div class="container">
        <div class="conteudo">
            <img src="../image/screen1_l.jpeg" alt="Vaccine">
        </div>

        <div class="login">
            <img src="../image/screen2_l.jpeg" alt="wscreen_login">
                <div class="forms">
                    <div class="input-group">
                        <div class="input-box">
                            <label for="cpf">CPF</label>
                            <input id="cpf" type="text" name="cpf" placeholder="Digite seu CPF" required>
                        </div>
    
                        <div class="input-box">
                            <label for="senha">Senha</label>
                            <input id="senha" type="text" name="senha" placeholder="Digite sua senha" required>
                        </div>
                    </div>
    
                    <div class="login-button">
                        <button><a href="#">Login</a></button>
                    </div>

                    <div class="recuperar_senha">
                        <a href="#">Esqueceu sua senha?</a>
                    </div>
    
                    <div class="no-account">
                        <p>Ainda não tem conta?</p>
                        <a href="#">Crie seu cadastro!</a>
                    </div>
                </div>
        </div>
    </div>


</body>

</html>
